<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4774492706708315"
     crossorigin="anonymous"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Counter — Count Characters Online | AnagramGen</title>
<meta name="description" content="Free online character counter. Count characters with and without spaces. Perfect for Twitter, Instagram, SMS and SEO meta descriptions.">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4774492706708315"
     crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #f7f6f2; color: #28251d; min-height: 100vh; }
header { background: #fff; border-bottom: 1px solid #e0ddd8; position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 960px; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
.logo { font-size: 1.2rem; font-weight: 700; color: #01696f; text-decoration: none; white-space: nowrap; }
.nav { display: flex; gap: 4px; margin-left: auto; flex-wrap: wrap; }
.nav a { padding: 6px 12px; border-radius: 8px; font-size: .85rem; color: #3a3830; text-decoration: none; transition: background .15s; }
.nav a:hover { background: #e8f4f4; color: #01696f; }
.menu-btn { display: none; background: none; border: none; font-size: 1.4rem; cursor: pointer; margin-left: auto; }
main { max-width: 760px; margin: 0 auto; padding: 48px 24px 80px; }
h1 { font-size: 2rem; margin-bottom: 8px; }
.subtitle { color: #7a7974; margin-bottom: 36px; }
.card { background: #fff; border: 1px solid #e0ddd8; border-radius: 16px; padding: 32px; box-shadow: 0 4px 16px rgba(0,0,0,.06); margin-bottom: 24px; }
input[type=text], input[type=email], input[type=number], textarea, select {
  width: 100%; padding: 12px 16px; border: 2px solid #e0ddd8; border-radius: 10px;
  font-size: 1rem; font-family: inherit; background: #f7f6f2; color: #28251d;
  outline: none; transition: border .2s; margin-bottom: 16px; }
input:focus, textarea:focus, select:focus { border-color: #01696f; background: #fff; }
textarea { resize: vertical; }
.btn { padding: 12px 28px; background: #01696f; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .2s; }
.btn:hover { background: #0c4e54; }
.btn-outline { background: #fff; color: #01696f; border: 2px solid #01696f; margin-left: 8px; }
.btn-outline:hover { background: #e8f4f4; }
.result-box { background: #e8f4f4; border-radius: 10px; padding: 20px 24px; margin-top: 16px; }
.result-num { font-size: 2.5rem; font-weight: 700; color: #01696f; }
.result-label { font-size: .9rem; color: #7a7974; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 16px; }
.stat-card { background: #fff; border: 1px solid #e0ddd8; border-radius: 10px; padding: 16px; text-align: center; }
.stat-num { font-size: 1.8rem; font-weight: 700; color: #01696f; }
.stat-lbl { font-size: .8rem; color: #7a7974; margin-top: 4px; }
footer { text-align: center; padding: 24px; font-size: .8rem; color: #bab9b4; border-top: 1px solid #e0ddd8; }
footer a { color: #01696f; }
@media(max-width:640px){
  .nav { display: none; flex-direction: column; position: absolute; top: 56px; left: 0; right: 0; background: #fff; border-bottom: 1px solid #e0ddd8; padding: 12px; }
  .nav.open { display: flex; }
  .menu-btn { display: block; }
  .header-inner { position: relative; }
}

#textInput { height: 180px; margin-bottom: 0; }
.limit-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.progress-wrap { background: #e0ddd8; border-radius: 999px; height: 8px; margin: 12px 0; overflow: hidden; }
.progress-bar { height: 100%; border-radius: 999px; background: #01696f; transition: width .2s, background .2s; }
.platform-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.plat-btn { padding: 6px 14px; border-radius: 999px; border: 1.5px solid #e0ddd8; font-size: .8rem; font-weight: 600; cursor: pointer; background: #f7f6f2; color: #7a7974; transition: all .15s; }
.plat-btn:hover, .plat-btn.active { border-color: #01696f; background: #e8f4f4; color: #01696f; }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="index.html">🔤 AnagramGen</a>
    <nav class="nav">
      <a href="index.html">Anagram</a>
      <a href="word-counter.html">Word Counter</a>
      <a href="password-generator.html">Password</a>
      <a href="char-counter.html">Char Counter</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
    <button class="menu-btn" onclick="document.querySelector('.nav').classList.toggle('open')">☰</button>
  </div>
</header>
<main>
  <h1>Character Counter</h1>
  <p class="subtitle">Count characters instantly. Set a limit for Twitter, Instagram captions, SMS and more.</p>
  <div class="card">
    <p style="font-size:.85rem;color:#7a7974;margin-bottom:8px">Quick limits:</p>
    <div class="platform-btns">
      <button class="plat-btn" onclick="setLimit(280,this)">Twitter (280)</button>
      <button class="plat-btn" onclick="setLimit(2200,this)">Instagram (2200)</button>
      <button class="plat-btn" onclick="setLimit(160,this)">SMS (160)</button>
      <button class="plat-btn" onclick="setLimit(160,this)">Meta Desc (160)</button>
      <button class="plat-btn" onclick="setLimit(0,this)">No Limit</button>
    </div>
    <textarea id="textInput" placeholder="Type or paste your text here…" oninput="count()"></textarea>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" id="total">0</div><div class="stat-lbl">Characters</div></div>
      <div class="stat-card"><div class="stat-num" id="nospace">0</div><div class="stat-lbl">No Spaces</div></div>
      <div class="stat-card"><div class="stat-num" id="remaining">∞</div><div class="stat-lbl">Remaining</div></div>
      <div class="stat-card"><div class="stat-num" id="lines">0</div><div class="stat-lbl">Lines</div></div>
    </div>
  </div>
</main>
<footer>
  <p>© 2026 AnagramGen · <a href="privacy.html">Privacy Policy</a> · <a href="contact.html">Contact</a></p>
</footer>
<script>
let limit=0;
function setLimit(n,btn){
  limit=n;
  document.querySelectorAll('.plat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  count();
}
function count(){
  const t=document.getElementById('textInput').value;
  const total=t.length;
  document.getElementById('total').textContent=total.toLocaleString();
  document.getElementById('nospace').textContent=t.replace(/\s/g,'').length.toLocaleString();
  document.getElementById('lines').textContent=t.split('\n').length;
  if(limit>0){
    const rem=limit-total;
    document.getElementById('remaining').textContent=rem>=0?rem:'−'+(Math.abs(rem));
    const pct=Math.min(100,(total/limit)*100);
    const bar=document.getElementById('progressBar');
    bar.style.width=pct+'%';
    bar.style.background=pct>100?'#dc2626':pct>80?'#d97706':'#01696f';
  } else {
    document.getElementById('remaining').textContent='∞';
    document.getElementById('progressBar').style.width='0%';
  }
}
</script>
</body>
</html>
