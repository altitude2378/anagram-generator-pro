<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — Free Strong Password Tool | AnagramGen</title>
<meta name="description" content="Generate strong, secure random passwords instantly. Customize length and character types. Free online password generator.">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4774492706708315"
     crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #f7f6f2; color: #28251d; min-height: 100vh; }
header { background: #fff; border-bottom: 1px solid #e0ddd8; position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 960px; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
.logo { font-size: 1.2rem; font-weight: 700; color: #01696f; text-decoration: none; white-space: nowrap; }
.nav { display: flex; gap: 4px; margin-left: auto; flex-wrap: wrap; }
.nav a { padding: 6px 12px; border-radius: 8px; font-size: .85rem; color: #3a3830; text-decoration: none; transition: background .15s; }
.nav a:hover { background: #e8f4f4; color: #01696f; }
.menu-btn { display: none; background: none; border: none; font-size: 1.4rem; cursor: pointer; margin-left: auto; }
main { max-width: 760px; margin: 0 auto; padding: 48px 24px 80px; }
h1 { font-size: 2rem; margin-bottom: 8px; }
.subtitle { color: #7a7974; margin-bottom: 36px; }
.card { background: #fff; border: 1px solid #e0ddd8; border-radius: 16px; padding: 32px; box-shadow: 0 4px 16px rgba(0,0,0,.06); margin-bottom: 24px; }
input[type=text], input[type=email], input[type=number], textarea, select {
  width: 100%; padding: 12px 16px; border: 2px solid #e0ddd8; border-radius: 10px;
  font-size: 1rem; font-family: inherit; background: #f7f6f2; color: #28251d;
  outline: none; transition: border .2s; margin-bottom: 16px; }
input:focus, textarea:focus, select:focus { border-color: #01696f; background: #fff; }
textarea { resize: vertical; }
.btn { padding: 12px 28px; background: #01696f; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .2s; }
.btn:hover { background: #0c4e54; }
.btn-outline { background: #fff; color: #01696f; border: 2px solid #01696f; margin-left: 8px; }
.btn-outline:hover { background: #e8f4f4; }
.result-box { background: #e8f4f4; border-radius: 10px; padding: 20px 24px; margin-top: 16px; }
.result-num { font-size: 2.5rem; font-weight: 700; color: #01696f; }
.result-label { font-size: .9rem; color: #7a7974; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 16px; }
.stat-card { background: #fff; border: 1px solid #e0ddd8; border-radius: 10px; padding: 16px; text-align: center; }
.stat-num { font-size: 1.8rem; font-weight: 700; color: #01696f; }
.stat-lbl { font-size: .8rem; color: #7a7974; margin-top: 4px; }
footer { text-align: center; padding: 24px; font-size: .8rem; color: #bab9b4; border-top: 1px solid #e0ddd8; }
footer a { color: #01696f; }
@media(max-width:640px){
  .nav { display: none; flex-direction: column; position: absolute; top: 56px; left: 0; right: 0; background: #fff; border-bottom: 1px solid #e0ddd8; padding: 12px; }
  .nav.open { display: flex; }
  .menu-btn { display: block; }
  .header-inner { position: relative; }
}

.pw-display { background: #1a2a2a; color: #4fd1c5; font-family: monospace; font-size: 1.4rem; padding: 20px 24px; border-radius: 10px; letter-spacing: .08em; word-break: break-all; margin-bottom: 16px; min-height: 64px; }
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.opt-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e0ddd8; }
.opt-row label { font-weight: 600; font-size: .95rem; }
.toggle { width: 44px; height: 24px; background: #e0ddd8; border-radius: 999px; position: relative; cursor: pointer; transition: background .2s; border: none; }
.toggle.on { background: #01696f; }
.toggle::after { content: ''; position: absolute; width: 18px; height: 18px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: left .2s; }
.toggle.on::after { left: 23px; }
.strength-bar { height: 6px; border-radius: 999px; background: #e0ddd8; margin-bottom: 20px; overflow: hidden; }
.strength-fill { height: 100%; border-radius: 999px; transition: width .3s, background .3s; }
.btn-row { display: flex; gap: 8px; }
input[type=range] { width: 100%; accent-color: #01696f; margin-bottom: 0; background: none; border: none; padding: 0; }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="index.html">🔤 AnagramGen</a>
    <nav class="nav">
      <a href="index.html">Anagram</a>
      <a href="word-counter.html">Word Counter</a>
      <a href="password-generator.html">Password</a>
      <a href="char-counter.html">Char Counter</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
    <button class="menu-btn" onclick="document.querySelector('.nav').classList.toggle('open')">☰</button>
  </div>
</header>
<main>
  <h1>Password Generator</h1>
  <p class="subtitle">Create strong, secure passwords instantly. Customize length and character types.</p>
  <div class="card">
    <div class="pw-display" id="pwDisplay">Click Generate!</div>
    <div class="strength-bar"><div class="strength-fill" id="strengthFill" style="width:0%;background:#e0ddd8"></div></div>
    <div class="opt-row">
      <label>Length: <span id="lenVal">16</span></label>
      <input type="range" id="pwLen" min="6" max="64" value="16" oninput="document.getElementById('lenVal').textContent=this.value;generate()">
    </div>
    <div class="opt-row"><label>Uppercase (A–Z)</label><button class="toggle on" id="togUpper" onclick="tog(this);generate()"></button></div>
    <div class="opt-row"><label>Lowercase (a–z)</label><button class="toggle on" id="togLower" onclick="tog(this);generate()"></button></div>
    <div class="opt-row"><label>Numbers (0–9)</label><button class="toggle on" id="togNum" onclick="tog(this);generate()"></button></div>
    <div class="opt-row" style="border:none"><label>Symbols (!@#$…)</label><button class="toggle on" id="togSym" onclick="tog(this);generate()"></button></div>
    <div class="btn-row" style="margin-top:20px">
      <button class="btn" onclick="generate()">🔄 Generate</button>
      <button class="btn btn-outline" onclick="copyPw()">📋 Copy</button>
    </div>
  </div>
</main>
<footer>
  <p>© 2026 AnagramGen · <a href="privacy.html">Privacy Policy</a> · <a href="contact.html">Contact</a></p>
</footer>
<script>
const UP='ABCDEFGHIJKLMNOPQRSTUVWXYZ', LO='abcdefghijklmnopqrstuvwxyz', NU='0123456789', SY='!@#$%^&*()_+-=[]{}|;:,.<>?';
function tog(b){ b.classList.toggle('on'); }
function generate(){
  let chars='';
  if(document.getElementById('togUpper').classList.contains('on')) chars+=UP;
  if(document.getElementById('togLower').classList.contains('on')) chars+=LO;
  if(document.getElementById('togNum').classList.contains('on')) chars+=NU;
  if(document.getElementById('togSym').classList.contains('on')) chars+=SY;
  if(!chars){ document.getElementById('pwDisplay').textContent='Select at least one option'; return; }
  const len=parseInt(document.getElementById('pwLen').value);
  let pw='';
  const arr=new Uint32Array(len);
  crypto.getRandomValues(arr);
  arr.forEach(n=>pw+=chars[n%chars.length]);
  document.getElementById('pwDisplay').textContent=pw;
  const score=Math.min(100,len*2+(chars.length>50?30:chars.length>30?20:10));
  const color=score>75?'#01696f':score>50?'#d97706':'#dc2626';
  document.getElementById('strengthFill').style.width=score+'%';
  document.getElementById('strengthFill').style.background=color;
}
function copyPw(){
  const pw=document.getElementById('pwDisplay').textContent;
  navigator.clipboard.writeText(pw);
  const btn=event.target; btn.textContent='✅ Copied!'; setTimeout(()=>btn.textContent='📋 Copy',1500);
}
generate();
</script>
</body>
</html>
